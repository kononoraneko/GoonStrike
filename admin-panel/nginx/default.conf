## Admin static files + proxy everything else to FastAPI (same port as UI).
## Set "Backend URL" in the panel to this server origin (e.g. http://127.0.0.1:5173 or http://your-host:5173).

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    location = / {
        try_files /index.html =404;
    }

    location ~* \.(css|js|html|svg|webp|png|ico|woff2?)$ {
        try_files $uri =404;
    }

    location / {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
